quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:3000,http://localhost:5173,^http://192\\.168\\..*:[0-9]+$
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept, authorization, content-type, x-requested-with

quarkus.http.host=0.0.0.0

quarkus.http.body.uploads-directory=${UPLOADS_DIR:${app.base-dir}/data/photos}
quarkus.http.body.delete-uploaded-files-on-end=true
quarkus.http.limits.max-body-size=${MAX_FILE_SIZE:500M}

app.base-dir=${APP_BASE_DIR:${user.home}/photo-analyzer}

app.download-dir=${APP_DOWNLOAD_DIR:${app.base-dir}/uploads/photos}
app.photos-system-dir=${PHOTOS_STORAGE_DIR:${app.base-dir}/data/photos}

app.max-upload-number=${MAX_FILE_UPLOAD_NUMBER:10}

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:postgres}
quarkus.datasource.password=${DB_PASSWORD:admin}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/photo_db}
quarkus.hibernate-orm.database.generation=${HIBERNATE_DB_GENERATION:update}
quarkus.hibernate-orm.sql-load-script=no-file
quarkus.hibernate-orm.log.sql=${DB_LOG_SQL:true}
quarkus.datasource.jdbc.min-size=${DB_MIN_CONNECTION_SIZE:1}
quarkus.datasource.jdbc.max-size=${DB_MAX_CONNECTION_SIZE:10}
quarkus.datasource.jdbc.initial-size=${DB_INITIAL_CONNECTION_SIZE:1}
quarkus.datasource.jdbc.idle-removal-interval=${DB_IDLE_REMOVAL_INTERVAL:300}

%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:photoDB;DB_CLOSE_DELAY=-1
%test.quarkus.datasource.username=admin
%test.quarkus.datasource.password=admin

%test.quarkus.hibernate-orm.database.generation=drop-and-create
%test.quarkus.hibernate-orm.log.sql=false